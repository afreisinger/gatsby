---
    name: Build and publish container
    
    on:
      # cron job to trigger the build on any push to main
      push:
        branches:
          - 'main'
    permissions:
      contents: write
    
    jobs:
      build:
        runs-on: ubuntu-latest
    
        steps:
        - name: Checkout Repository
          uses: actions/checkout@v4
    
        - name: Get latest release of gatsby-cli
          id: latest_release
          run: |
           release=$(curl --silent "https://registry.npmjs.org/gatsby-cli/latest" | jq -r '.version')
           echo "latest_version=$release" >> $GITHUB_ENV
           echo "release=$release" >> $GITHUB_OUTPUT

        - name: Display the latest version
          run: |
            echo "The latest version of gatsby-cli is: ${{ steps.latest_release.outputs.release }}"

        
        - name: Get previous release tag
          id: previous_release
          env:
            token: ${{ secrets.GITHUB_TOKEN }}
            repository: "afreisinger/gatsby"
            type: "stable"
          run: echo release=$(curl --silent "https://api.github.com/repos/afreisinger/gatsby/releases/latest" | jq -r '.tag_name' ) >> $GITHUB_OUTPUT
        
        - name: Display the previus realease tag
          run: |
            if [ "${{ steps.previous_release.outputs.release }}" == "null" ]; then
              echo "No previous release of gatsby-cli is available."
            else
              echo "The previus release of gatsby-cli is: ${{ steps.previous_release.outputs.release }}"
            fi

            ss
        - name: Set image version and revision
          id: set_labels
          run: |
              echo "IMAGE_VERSION=${{ steps.latest_release.outputs.release }}" >> $GITHUB_ENV
              echo "The image version of gatsby-cli is: ${{ steps.latest_release.outputs.release }}"
          
              echo "IMAGE_REVISION=$(git rev-parse HEAD)" >> $GITHUB_ENV
              echo "The image revision is: $(git rev-parse --short HEAD)"
          
              echo "IMAGE_CREATED=$(TZ='America/Sao_Paulo' date +'%Y-%m-%d %H:%M GMT-3')" >> $GITHUB_ENV
              echo "The image date is: $(TZ='America/Sao_Paulo' date +'%Y-%m-%d %H:%M GMT-3')"
          
    
        - name: Set up QEMU
          uses: docker/setup-qemu-action@v3
          if: ${{ steps.latest_release.outputs.release != steps.previous_release.outputs.release }}
    
        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3
          if: ${{ steps.latest_release.outputs.release != steps.previous_release.outputs.release }}
    
        - name: Login to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_TOKEN }}
          if: ${{ steps.latest_release.outputs.release != steps.previous_release.outputs.release }}
    
        - name: Build and push
          uses: docker/build-push-action@v6
          with:
            context: "{{defaultContext}}"
            platforms: linux/arm/v7,linux/arm64/v8,linux/amd64
            push: true
            tags: afreisinger/gatsby:latest,afreisinger/gatsby:${{ steps.latest_release.outputs.release }}
          if: ${{ steps.latest_release.outputs.release != steps.previous_release.outputs.release }}
    
        - name: Create release
          uses: softprops/action-gh-release@v2
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          with:
            tag_name: ${{ steps.latest_release.outputs.release }}
            name: "${{ steps.latest_release.outputs.release }}"
            body: |
              Changelog found on [gatsby](https://registry.npmjs.org/gatsby-cli/latest), please read the changes before updating.
              You can update the docker image with:
              ```
              docker compose pull
              docker compose up -d
              ```
          if: ${{ steps.latest_release.outputs.release != steps.previous_release.outputs.release }}